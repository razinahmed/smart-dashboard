<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="chartLineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16c784;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#16c784;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>

    <filter id="shadowLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main Background -->
  <rect width="1200" height="700" fill="url(#bgGradient)"/>

  <!-- Sidebar -->
  <rect width="80" height="700" fill="#16213e"/>

  <!-- Sidebar Icons/Nav Items -->
  <!-- Dashboard Icon (active) -->
  <circle cx="40" cy="50" r="6" fill="#4ecdc4"/>
  <rect x="30" y="40" width="20" height="20" rx="2" fill="none" stroke="#4ecdc4" stroke-width="2"/>

  <!-- Analytics Icon -->
  <g transform="translate(40, 110)">
    <line x1="-8" y1="6" x2="-8" y2="10" stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2" y1="2" x2="-2" y2="10" stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="0" x2="4" y2="10" stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Users Icon -->
  <g transform="translate(40, 170)">
    <circle cx="-4" cy="-2" r="3" fill="#b0b0b0"/>
    <circle cx="4" cy="-2" r="3" fill="#b0b0b0"/>
    <path d="M -8 2 Q -8 4 -4 4 Q 0 4 0 2" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
    <path d="M 4 2 Q 4 4 8 4 Q 12 4 12 2" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
  </g>

  <!-- Settings Icon -->
  <g transform="translate(40, 230)">
    <circle cx="0" cy="0" r="4" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
    <circle cx="-6" cy="-6" r="1" fill="#b0b0b0"/>
    <circle cx="6" cy="-6" r="1" fill="#b0b0b0"/>
    <circle cx="6" cy="6" r="1" fill="#b0b0b0"/>
    <circle cx="-6" cy="6" r="1" fill="#b0b0b0"/>
  </g>

  <!-- Top Bar -->
  <rect x="80" y="0" width="1120" height="70" fill="#0f3460" opacity="0.5"/>

  <!-- Logo/Title -->
  <text x="120" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">
    Smart Dashboard
  </text>

  <!-- Theme Toggle (Moon Icon) -->
  <g transform="translate(1140, 35)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
    <path d="M -4 -6 Q -2 -8 2 -8 Q 4 -6 4 -2 Q 4 2 2 4 Q -2 6 -4 4 Q -6 2 -6 -2 Q -6 -6 -4 -6" fill="#4ecdc4" opacity="0.7"/>
  </g>

  <!-- KPI Cards Container -->
  <!-- Card 1: Total Visitors -->
  <g filter="url(#shadow)">
    <rect x="110" y="90" width="240" height="120" rx="12" fill="url(#cardGradient)" stroke="#16c784" stroke-width="1" opacity="0.8"/>
    <text x="140" y="115" font-family="Arial, sans-serif" font-size="14" fill="#b0b0b0">Total Visitors</text>
    <text x="140" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">24,521</text>
    <!-- Green Up Arrow -->
    <path d="M 330 140 L 335 155 L 340 140" fill="none" stroke="#16c784" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="310" y="160" font-family="Arial, sans-serif" font-size="12" fill="#16c784">+12.5%</text>
  </g>

  <!-- Card 2: Revenue -->
  <g filter="url(#shadow)">
    <rect x="370" y="90" width="240" height="120" rx="12" fill="url(#cardGradient)" stroke="#16c784" stroke-width="1" opacity="0.8"/>
    <text x="400" y="115" font-family="Arial, sans-serif" font-size="14" fill="#b0b0b0">Revenue</text>
    <text x="400" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">$48,350</text>
    <!-- Green Up Arrow -->
    <path d="M 590 140 L 595 155 L 600 140" fill="none" stroke="#16c784" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="570" y="160" font-family="Arial, sans-serif" font-size="12" fill="#16c784">+8.2%</text>
  </g>

  <!-- Card 3: Conversion -->
  <g filter="url(#shadow)">
    <rect x="630" y="90" width="240" height="120" rx="12" fill="url(#cardGradient)" stroke="#ea3943" stroke-width="1" opacity="0.8"/>
    <text x="660" y="115" font-family="Arial, sans-serif" font-size="14" fill="#b0b0b0">Conversion Rate</text>
    <text x="660" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">3.2%</text>
    <!-- Red Down Arrow -->
    <path d="M 850 140 L 855 125 L 860 140" fill="none" stroke="#ea3943" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="830" y="160" font-family="Arial, sans-serif" font-size="12" fill="#ea3943">-2.1%</text>
  </g>

  <!-- Card 4: Active Users -->
  <g filter="url(#shadow)">
    <rect x="890" y="90" width="240" height="120" rx="12" fill="url(#cardGradient)" stroke="#16c784" stroke-width="1" opacity="0.8"/>
    <text x="920" y="115" font-family="Arial, sans-serif" font-size="14" fill="#b0b0b0">Active Users</text>
    <text x="920" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">1,847</text>
    <!-- Green Up Arrow -->
    <path d="M 1110 140 L 1115 155 L 1120 140" fill="none" stroke="#16c784" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1090" y="160" font-family="Arial, sans-serif" font-size="12" fill="#16c784">+5.3%</text>
  </g>

  <!-- Charts Section -->
  <!-- Line Chart Container -->
  <g filter="url(#shadowLarge)">
    <rect x="110" y="240" width="520" height="280" rx="12" fill="#0f3460" opacity="0.9" stroke="#16213e" stroke-width="1"/>

    <!-- Chart Title -->
    <text x="130" y="265" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Revenue Trend</text>

    <!-- Grid Lines -->
    <line x1="130" y1="290" x2="600" y2="290" stroke="#16213e" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="330" x2="600" y2="330" stroke="#16213e" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="370" x2="600" y2="370" stroke="#16213e" stroke-width="1" opacity="0.5"/>
    <line x1="130" y1="410" x2="600" y2="410" stroke="#16213e" stroke-width="1" opacity="0.5"/>

    <!-- Y-axis labels -->
    <text x="115" y="295" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">$50k</text>
    <text x="115" y="335" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">$37.5k</text>
    <text x="115" y="375" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">$25k</text>
    <text x="115" y="415" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">$12.5k</text>

    <!-- Chart Area (gradient background) -->
    <rect x="130" y="280" width="480" height="150" fill="url(#chartLineGradient)" rx="4"/>

    <!-- Smooth line chart (revenue curve) -->
    <path d="M 150 380 Q 200 340 250 320 T 350 310 T 450 290 T 550 310 T 600 300"
          fill="none" stroke="#16c784" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points -->
    <circle cx="150" cy="380" r="3" fill="#16c784"/>
    <circle cx="250" cy="320" r="3" fill="#16c784"/>
    <circle cx="350" cy="310" r="3" fill="#16c784"/>
    <circle cx="450" cy="290" r="3" fill="#16c784"/>
    <circle cx="550" cy="310" r="3" fill="#16c784"/>
    <circle cx="600" cy="300" r="3" fill="#16c784"/>

    <!-- X-axis labels -->
    <text x="150" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Jan</text>
    <text x="250" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Feb</text>
    <text x="350" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Mar</text>
    <text x="450" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Apr</text>
    <text x="550" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">May</text>
    <text x="600" y="450" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Jun</text>
  </g>

  <!-- Bar Chart Container -->
  <g filter="url(#shadowLarge)">
    <rect x="650" y="240" width="480" height="280" rx="12" fill="#0f3460" opacity="0.9" stroke="#16213e" stroke-width="1"/>

    <!-- Chart Title -->
    <text x="670" y="265" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Monthly Visitors</text>

    <!-- Grid Lines -->
    <line x1="680" y1="290" x2="1100" y2="290" stroke="#16213e" stroke-width="1" opacity="0.5"/>
    <line x1="680" y1="340" x2="1100" y2="340" stroke="#16213e" stroke-width="1" opacity="0.5"/>
    <line x1="680" y1="390" x2="1100" y2="390" stroke="#16213e" stroke-width="1" opacity="0.5"/>

    <!-- Y-axis labels -->
    <text x="665" y="295" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">30k</text>
    <text x="665" y="345" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">20k</text>
    <text x="665" y="395" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="end">10k</text>

    <!-- Bars with gradient -->
    <defs>
      <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#2596be;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Bar 1 -->
    <rect x="700" y="310" width="35" height="80" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="717.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Jan</text>

    <!-- Bar 2 -->
    <rect x="755" y="300" width="35" height="90" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="772.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Feb</text>

    <!-- Bar 3 -->
    <rect x="810" y="285" width="35" height="105" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="827.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Mar</text>

    <!-- Bar 4 -->
    <rect x="865" y="295" width="35" height="95" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="882.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Apr</text>

    <!-- Bar 5 -->
    <rect x="920" y="275" width="35" height="115" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="937.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">May</text>

    <!-- Bar 6 -->
    <rect x="975" y="290" width="35" height="100" rx="4" fill="url(#barGradient)" opacity="0.9"/>
    <text x="992.5" y="410" font-family="Arial, sans-serif" font-size="11" fill="#b0b0b0" text-anchor="middle">Jun</text>
  </g>

  <!-- Doughnut/Pie Chart Container -->
  <g filter="url(#shadowLarge)">
    <rect x="110" y="540" width="520" height="130" rx="12" fill="#0f3460" opacity="0.9" stroke="#16213e" stroke-width="1"/>

    <!-- Chart Title -->
    <text x="130" y="565" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Traffic Sources</text>

    <!-- Doughnut Chart -->
    <g transform="translate(250, 615)">
      <!-- Outer circle -->
      <circle cx="0" cy="0" r="35" fill="none" stroke="#4ecdc4" stroke-width="12" opacity="0.8" stroke-dasharray="65 219" stroke-dashoffset="0"/>
      <!-- Second segment -->
      <circle cx="0" cy="0" r="35" fill="none" stroke="#16c784" stroke-width="12" opacity="0.8" stroke-dasharray="55 219" stroke-dashoffset="-65"/>
      <!-- Third segment -->
      <circle cx="0" cy="0" r="35" fill="none" stroke="#ea3943" stroke-width="12" opacity="0.8" stroke-dasharray="44 219" stroke-dashoffset="-120"/>
      <!-- Center circle (for doughnut effect) -->
      <circle cx="0" cy="0" r="18" fill="#0f3460"/>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">62%</text>
    </g>

    <!-- Legend -->
    <g transform="translate(380, 575)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#4ecdc4"/>
      <text x="18" y="10" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Organic (62%)</text>

      <rect x="0" y="25" width="12" height="12" rx="2" fill="#16c784"/>
      <text x="18" y="35" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Direct (25%)</text>

      <rect x="0" y="50" width="12" height="12" rx="2" fill="#ea3943"/>
      <text x="18" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Social (13%)</text>
    </g>
  </g>

  <!-- Additional Info Cards at Bottom Right -->
  <g filter="url(#shadow)">
    <rect x="650" y="540" width="480" height="130" rx="12" fill="#0f3460" opacity="0.9" stroke="#16213e" stroke-width="1"/>

    <!-- Title -->
    <text x="670" y="565" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Quick Stats</text>

    <!-- Stat Row 1 -->
    <text x="670" y="595" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0">Avg Session Duration</text>
    <text x="670" y="615" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4ecdc4">4m 32s</text>

    <!-- Stat Row 2 -->
    <text x="870" y="595" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0">Bounce Rate</text>
    <text x="870" y="615" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#16c784">28.4%</text>

    <!-- Stat Row 3 -->
    <text x="670" y="650" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0">Pages per Session</text>
    <text x="670" y="670" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ea3943">3.8</text>

    <!-- Stat Row 4 -->
    <text x="870" y="650" font-family="Arial, sans-serif" font-size="12" fill="#b0b0b0">Return Visitors</text>
    <text x="870" y="670" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4ecdc4">42.1%</text>
  </g>
</svg>
